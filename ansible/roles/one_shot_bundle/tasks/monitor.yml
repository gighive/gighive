---

- name: Set one-shot bundle path prefixes for source-to-bundle comparison
  ansible.builtin.set_fact:
    _one_shot_bundle_install_src: "{{ repo_root }}/ansible/roles/docker/files/one_shot_bundle/install.sh"
    _one_shot_bundle_one_shot_bundle_prefix: "{{ repo_root }}/ansible/roles/docker/files/one_shot_bundle"
    _one_shot_bundle_files_prefix: "{{ repo_root }}/ansible/roles/docker/files/"
    _one_shot_bundle_templates_prefix: "{{ repo_root }}/ansible/roles/docker/templates/"
    _one_shot_bundle_assets_prefix: "{{ repo_root }}/assets/"

- name: Stat one-shot bundle input paths on controller
  delegate_to: localhost
  become: false
  ansible.builtin.stat:
    path: "{{ item }}"
  loop: "{{ one_shot_bundle_input_paths | default([]) }}"
  register: _one_shot_bundle_inputs_paths_stat

- name: Find files under monitored input directories on controller
  delegate_to: localhost
  become: false
  ansible.builtin.find:
    paths: "{{ item.stat.path }}"
    file_type: file
    recurse: true
    hidden: true
    patterns: "*"
    excludes:
      - "._*"
      - ".DS_Store"
  loop: "{{ _one_shot_bundle_inputs_paths_stat.results | selectattr('stat.isdir','defined') | selectattr('stat.isdir') | list }}"
  loop_control:
    label: "{{ item.stat.path }}"
  register: _one_shot_bundle_inputs_find_results

- name: Initialize source manifest dict
  ansible.builtin.set_fact:
    _one_shot_bundle_source_manifest: {}
    _one_shot_bundle_source_details: {}

- name: Add directory file entries to source manifest mapping bundle_path->mtime+size
  ansible.builtin.set_fact:
    _one_shot_bundle_source_manifest: >-
      {{
        _one_shot_bundle_source_manifest
        | combine(((item.mtime | string) ~ ':' ~ (item.size | string)) | community.general.dict_kv(_one_shot_bundle_dest_file | trim))
      }}
    _one_shot_bundle_source_details: >-
      {{
        _one_shot_bundle_source_details
        | combine(({"path": item.path, "mode": item.mode, "size": item.size, "mtime": item.mtime}) | community.general.dict_kv(_one_shot_bundle_dest_file | trim))
      }}
  loop: "{{ (_one_shot_bundle_inputs_find_results.results | default([])) | map(attribute='files') | list | flatten }}"
  loop_control:
    label: "{{ item.path }}"
  vars:
    _p: "{{ item.path }}"
    _one_shot_bundle_dest_file: >-
      {% if _p == _one_shot_bundle_install_src %}
      install.sh
      {% elif _p.startswith(_one_shot_bundle_one_shot_bundle_prefix ~ '/') %}
      {{ _p[(_one_shot_bundle_one_shot_bundle_prefix ~ '/') | length:] }}
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'docker-compose.yml.j2') %}
      docker-compose.yml
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'entrypoint.sh.j2') %}
      apache/externalConfigs/entrypoint.sh
      {% elif _p == (_one_shot_bundle_templates_prefix ~ '.env.j2') %}
      apache/externalConfigs/.env
      {% elif _p == (_one_shot_bundle_templates_prefix ~ '.env.mysql.j2') %}
      mysql/externalConfigs/.env.mysql
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'apache2.conf.j2') %}
      apache/externalConfigs/apache2.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'default-ssl.conf.j2') %}
      apache/externalConfigs/default-ssl.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'gighive.htpasswd.j2') %}
      apache/externalConfigs/gighive.htpasswd
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'modsecurity.conf.j2') %}
      apache/externalConfigs/modsecurity.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'openssl_san.cnf.j2') %}
      apache/externalConfigs/openssl_san.cnf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'php-fpm.conf.j2') %}
      apache/externalConfigs/php-fpm.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'security2.conf.j2') %}
      apache/externalConfigs/security2.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'www.conf.j2') %}
      apache/externalConfigs/www.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'crs-setup.conf.j2') %}
      apache/externalConfigs/crs/crs-setup.conf
      {% elif _p.startswith(_one_shot_bundle_files_prefix) %}
      {{ _p[_one_shot_bundle_files_prefix | length:] }}
      {% elif _p.startswith(_one_shot_bundle_assets_prefix ~ 'audio/') %}
      _host_audio/{{ _p[(_one_shot_bundle_assets_prefix ~ 'audio/') | length:] }}
      {% elif _p.startswith(_one_shot_bundle_assets_prefix ~ 'video/') %}
      _host_video/{{ _p[(_one_shot_bundle_assets_prefix ~ 'video/') | length:] }}
      {% else %}
      {{ _p | basename }}
      {% endif %}

- name: Add individual file entries to source manifest mapping bundle_path->mtime+size
  ansible.builtin.set_fact:
    _one_shot_bundle_source_manifest: >-
      {{
        _one_shot_bundle_source_manifest
        | combine(((item.stat.mtime | string) ~ ':' ~ (item.stat.size | string)) | community.general.dict_kv(_one_shot_bundle_dest_file | trim))
      }}
    _one_shot_bundle_source_details: >-
      {{
        _one_shot_bundle_source_details
        | combine(({"path": item.stat.path, "mode": item.stat.mode, "size": item.stat.size, "mtime": item.stat.mtime}) | community.general.dict_kv(_one_shot_bundle_dest_file | trim))
      }}
  loop: "{{ _one_shot_bundle_inputs_paths_stat.results | selectattr('stat.isreg','defined') | selectattr('stat.isreg') | list }}"
  loop_control:
    label: "{{ item.stat.path }}"
  vars:
    _p: "{{ item.stat.path }}"
    _one_shot_bundle_dest_file: >-
      {% if _p == _one_shot_bundle_install_src %}
      install.sh
      {% elif _p.startswith(_one_shot_bundle_one_shot_bundle_prefix ~ '/') %}
      {{ _p[(_one_shot_bundle_one_shot_bundle_prefix ~ '/') | length:] }}
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'docker-compose.yml.j2') %}
      docker-compose.yml
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'entrypoint.sh.j2') %}
      apache/externalConfigs/entrypoint.sh
      {% elif _p == (_one_shot_bundle_templates_prefix ~ '.env.j2') %}
      apache/externalConfigs/.env
      {% elif _p == (_one_shot_bundle_templates_prefix ~ '.env.mysql.j2') %}
      mysql/externalConfigs/.env.mysql
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'apache2.conf.j2') %}
      apache/externalConfigs/apache2.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'default-ssl.conf.j2') %}
      apache/externalConfigs/default-ssl.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'gighive.htpasswd.j2') %}
      apache/externalConfigs/gighive.htpasswd
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'modsecurity.conf.j2') %}
      apache/externalConfigs/modsecurity.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'openssl_san.cnf.j2') %}
      apache/externalConfigs/openssl_san.cnf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'php-fpm.conf.j2') %}
      apache/externalConfigs/php-fpm.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'security2.conf.j2') %}
      apache/externalConfigs/security2.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'www.conf.j2') %}
      apache/externalConfigs/www.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'crs-setup.conf.j2') %}
      apache/externalConfigs/crs/crs-setup.conf
      {% elif _p.startswith(_one_shot_bundle_files_prefix) %}
      {{ _p[_one_shot_bundle_files_prefix | length:] }}
      {% elif _p.startswith(_one_shot_bundle_assets_prefix ~ 'audio/') %}
      _host_audio/{{ _p[(_one_shot_bundle_assets_prefix ~ 'audio/') | length:] }}
      {% elif _p.startswith(_one_shot_bundle_assets_prefix ~ 'video/') %}
      _host_video/{{ _p[(_one_shot_bundle_assets_prefix ~ 'video/') | length:] }}
      {% else %}
      {{ _p | basename }}
      {% endif %}
  when: item.stat.exists | default(false)

- name: Stat assembled one-shot bundle directory on controller
  delegate_to: localhost
  become: false
  ansible.builtin.stat:
    path: "{{ one_shot_bundle_bundle_dir }}"
  register: _one_shot_bundle_bundle_dir_stat

- name: Find files under assembled one-shot bundle directory on controller
  delegate_to: localhost
  become: false
  ansible.builtin.find:
    paths: "{{ one_shot_bundle_bundle_dir }}"
    file_type: file
    recurse: true
    hidden: true
    patterns: "*"
    excludes:
      - "._*"
      - ".DS_Store"
  register: _one_shot_bundle_bundle_find_results
  when: _one_shot_bundle_bundle_dir_stat.stat.exists | default(false)

- name: Initialize assembled bundle manifest dict
  ansible.builtin.set_fact:
    _one_shot_bundle_bundle_manifest: {}
    _one_shot_bundle_bundle_details: {}

- name: Add assembled bundle file entries to manifest mapping bundle_path->mtime+size
  ansible.builtin.set_fact:
    _one_shot_bundle_bundle_manifest: >-
      {{
        _one_shot_bundle_bundle_manifest
        | combine(((item.mtime | string) ~ ':' ~ (item.size | string)) | community.general.dict_kv(_one_shot_bundle_bundle_relative_path))
      }}
    _one_shot_bundle_bundle_details: >-
      {{
        _one_shot_bundle_bundle_details
        | combine(({"path": item.path, "mode": item.mode, "size": item.size, "mtime": item.mtime}) | community.general.dict_kv(_one_shot_bundle_bundle_relative_path))
      }}
  loop: "{{ _one_shot_bundle_bundle_find_results.files | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  vars:
    _one_shot_bundle_bundle_relative_path: "{{ item.path | regex_replace('^' ~ one_shot_bundle_bundle_dir ~ '/', '') }}"
  when: _one_shot_bundle_bundle_dir_stat.stat.exists | default(false)

- name: Report missing assembled one-shot bundle directory on controller
  ansible.builtin.debug:
    msg: >-
      The assembled one-shot bundle directory does not exist at
      {{ one_shot_bundle_bundle_dir }}.
      Source-to-bundle drift comparison could not be performed.
  when: not (_one_shot_bundle_bundle_dir_stat.stat.exists | default(false))

- name: Compute source files missing from assembled bundle
  ansible.builtin.set_fact:
    _one_shot_bundle_missing_from_bundle: "{{ _one_shot_bundle_source_manifest.keys() | difference(_one_shot_bundle_bundle_manifest.keys()) | sort }}"
    _one_shot_bundle_extra_in_bundle: "{{ _one_shot_bundle_bundle_manifest.keys() | difference(_one_shot_bundle_source_manifest.keys()) | sort }}"
  when: _one_shot_bundle_bundle_dir_stat.stat.exists | default(false)

- name: Initialize changed paths between source and assembled bundle
  ansible.builtin.set_fact:
    _one_shot_bundle_changed_between_source_and_bundle: []
    _one_shot_bundle_changed_between_source_and_bundle_details: []
    _one_shot_bundle_changed_between_source_and_bundle_ls_details: []
  when: _one_shot_bundle_bundle_dir_stat.stat.exists | default(false)

- name: Compute changed paths between source and assembled bundle
  ansible.builtin.set_fact:
    _one_shot_bundle_changed_between_source_and_bundle: "{{ _one_shot_bundle_changed_between_source_and_bundle + [item] }}"
  loop: "{{ _one_shot_bundle_source_manifest.keys() | intersect(_one_shot_bundle_bundle_manifest.keys()) | list }}"
  when:
    - _one_shot_bundle_bundle_dir_stat.stat.exists | default(false)
    - _one_shot_bundle_source_manifest[item] != _one_shot_bundle_bundle_manifest[item]

- name: Compute changed path details between source and assembled bundle
  ansible.builtin.set_fact:
    _one_shot_bundle_changed_between_source_and_bundle_details: >-
      {{
        _one_shot_bundle_changed_between_source_and_bundle_details
        + [
            {
              "bundle_relative_path": item,
              "source": _one_shot_bundle_source_details[item] | default({}),
              "bundle": _one_shot_bundle_bundle_details[item] | default({})
            }
          ]
      }}
  loop: "{{ _one_shot_bundle_changed_between_source_and_bundle | default([]) | sort }}"
  when: _one_shot_bundle_bundle_dir_stat.stat.exists | default(false)

- name: Capture ls output for changed source files in assembled bundle comparison
  delegate_to: localhost
  become: false
  check_mode: false
  ansible.builtin.command:
    argv:
      - ls
      - -ld
      - --time-style=long-iso
      - "{{ item.source.path }}"
  loop: "{{ _one_shot_bundle_changed_between_source_and_bundle_details | default([]) }}"
  loop_control:
    label: "{{ item.bundle_relative_path }}"
  register: _one_shot_bundle_changed_source_ls_results
  when:
    - _one_shot_bundle_bundle_dir_stat.stat.exists | default(false)
    - (_one_shot_bundle_changed_between_source_and_bundle_details | default([]) | length) > 0

- name: Capture ls output for changed assembled bundle files
  delegate_to: localhost
  become: false
  check_mode: false
  ansible.builtin.command:
    argv:
      - ls
      - -ld
      - --time-style=long-iso
      - "{{ item.bundle.path }}"
  loop: "{{ _one_shot_bundle_changed_between_source_and_bundle_details | default([]) }}"
  loop_control:
    label: "{{ item.bundle_relative_path }}"
  register: _one_shot_bundle_changed_bundle_ls_results
  when:
    - _one_shot_bundle_bundle_dir_stat.stat.exists | default(false)
    - (_one_shot_bundle_changed_between_source_and_bundle_details | default([]) | length) > 0

- name: Combine ls output for changed source-to-bundle files
  ansible.builtin.set_fact:
    _one_shot_bundle_changed_between_source_and_bundle_ls_details: >-
      {{
        _one_shot_bundle_changed_between_source_and_bundle_ls_details
        + [
            {
              "bundle_relative_path": item.bundle_relative_path,
              "source_ls": (_one_shot_bundle_changed_source_ls_results.results[index].stdout | default('')),
              "bundle_ls": (_one_shot_bundle_changed_bundle_ls_results.results[index].stdout | default(''))
            }
          ]
      }}
  loop: "{{ _one_shot_bundle_changed_between_source_and_bundle_details | default([]) }}"
  loop_control:
    index_var: index
    label: "{{ item.bundle_relative_path }}"
  when:
    - _one_shot_bundle_bundle_dir_stat.stat.exists | default(false)
    - (_one_shot_bundle_changed_between_source_and_bundle_details | default([]) | length) > 0

- name: Determine whether one-shot bundle source-to-bundle drift exists (controller source)
  ansible.builtin.set_fact:
    _one_shot_bundle_inputs_has_diffs: >-
      {{
        (_one_shot_bundle_missing_from_bundle | default([]) | length) > 0
        or (_one_shot_bundle_extra_in_bundle | default([]) | length) > 0
        or (_one_shot_bundle_changed_between_source_and_bundle | default([]) | length) > 0
      }}
  when: _one_shot_bundle_bundle_dir_stat.stat.exists | default(false)

- name: Compute unchanged paths between source and assembled bundle
  ansible.builtin.set_fact:
    _one_shot_bundle_unchanged_between_source_and_bundle: >-
      {{
        (_one_shot_bundle_source_manifest.keys() | intersect(_one_shot_bundle_bundle_manifest.keys()) | list)
        | difference(_one_shot_bundle_changed_between_source_and_bundle | default([]))
        | sort
      }}
  when: _one_shot_bundle_bundle_dir_stat.stat.exists | default(false)

- name: Show one-shot bundle source-to-bundle diff counts (controller source)
  ansible.builtin.debug:
    msg:
      files_that_did_not_change: "{{ _one_shot_bundle_unchanged_between_source_and_bundle | default([]) | length }}"
      missing_from_bundle: "{{ _one_shot_bundle_missing_from_bundle | default([]) | length }}"
      extra_in_bundle: "{{ _one_shot_bundle_extra_in_bundle | default([]) | length }}"
      changed_between_source_and_bundle: "{{ _one_shot_bundle_changed_between_source_and_bundle | default([]) | length }}"
  when:
    - _one_shot_bundle_bundle_dir_stat.stat.exists | default(false)
    - (_one_shot_bundle_missing_from_bundle | default([]) | length) > 0 or (_one_shot_bundle_extra_in_bundle | default([]) | length) > 0 or (_one_shot_bundle_changed_between_source_and_bundle | default([]) | length) > 0

- name: Show one-shot bundle source-to-bundle diffs (controller source)
  ansible.builtin.debug:
    msg:
      missing_from_bundle: "{{ _one_shot_bundle_missing_from_bundle | default([]) | sort }}"
      extra_in_bundle: "{{ _one_shot_bundle_extra_in_bundle | default([]) | sort }}"
      changed_between_source_and_bundle: "{{ _one_shot_bundle_changed_between_source_and_bundle | default([]) | sort }}"
  when:
    - _one_shot_bundle_bundle_dir_stat.stat.exists | default(false)
    - (_one_shot_bundle_missing_from_bundle | default([]) | length) > 0 or (_one_shot_bundle_extra_in_bundle | default([]) | length) > 0 or (_one_shot_bundle_changed_between_source_and_bundle | default([]) | length) > 0
