---

- name: Set one-shot bundle path prefixes for source-to-bundle comparison
  ansible.builtin.set_fact:
    _one_shot_bundle_one_shot_bundle_prefix: "{{ repo_root }}/ansible/roles/docker/files/one_shot_bundle"
    _one_shot_bundle_files_prefix: "{{ repo_root }}/ansible/roles/docker/files/"
    _one_shot_bundle_templates_prefix: "{{ repo_root }}/ansible/roles/docker/templates/"
    _one_shot_bundle_assets_prefix: "{{ repo_root }}/assets/"

- name: Stat one-shot bundle input paths on controller
  delegate_to: localhost
  become: false
  ansible.builtin.stat:
    path: "{{ item }}"
  loop: "{{ one_shot_bundle_input_paths | default([]) }}"
  register: _one_shot_bundle_inputs_paths_stat

- name: Find files under monitored input directories on controller
  delegate_to: localhost
  become: false
  ansible.builtin.find:
    paths: "{{ item.stat.path }}"
    file_type: file
    recurse: true
    hidden: true
    patterns: "*"
    excludes:
      - "._*"
      - ".DS_Store"
  loop: "{{ _one_shot_bundle_inputs_paths_stat.results | selectattr('stat.isdir','defined') | selectattr('stat.isdir') | list }}"
  loop_control:
    label: "{{ item.stat.path }}"
  register: _one_shot_bundle_inputs_find_results

- name: Initialize source manifest dict
  ansible.builtin.set_fact:
    _one_shot_bundle_source_manifest: {}
    _one_shot_bundle_source_details: {}

- name: Add directory file entries to source manifest mapping bundle_path->mtime+size
  ansible.builtin.set_fact:
    _one_shot_bundle_source_manifest: >-
      {{
        _one_shot_bundle_source_manifest
        | combine(((item.mtime | string) ~ ':' ~ (item.size | string)) | community.general.dict_kv(_one_shot_bundle_dest_file | trim))
      }}
    _one_shot_bundle_source_details: >-
      {{
        _one_shot_bundle_source_details
        | combine(({"path": item.path, "mode": item.mode, "size": item.size, "mtime": item.mtime}) | community.general.dict_kv(_one_shot_bundle_dest_file | trim))
      }}
  loop: "{{ (_one_shot_bundle_inputs_find_results.results | default([])) | map(attribute='files') | list | flatten }}"
  loop_control:
    label: "{{ item.path }}"
  vars:
    _p: "{{ item.path }}"
    _one_shot_bundle_dest_file: >-
      {% if _p.startswith(_one_shot_bundle_one_shot_bundle_prefix ~ '/') %}
      {{ _p[(_one_shot_bundle_one_shot_bundle_prefix ~ '/') | length:] }}
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'docker-compose.yml.j2') %}
      docker-compose.yml
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'install.sh.j2') %}
      install.sh
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'install.ps1.j2') %}
      install.ps1
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'entrypoint.sh.j2') %}
      apache/externalConfigs/entrypoint.sh
      {% elif _p == (_one_shot_bundle_templates_prefix ~ '.env.j2') %}
      apache/externalConfigs/.env
      {% elif _p == (_one_shot_bundle_templates_prefix ~ '.env.mysql.j2') %}
      mysql/externalConfigs/.env.mysql
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'apache2.conf.j2') %}
      apache/externalConfigs/apache2.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'default-ssl.conf.j2') %}
      apache/externalConfigs/default-ssl.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'gighive.htpasswd.j2') %}
      apache/externalConfigs/gighive.htpasswd
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'modsecurity.conf.j2') %}
      apache/externalConfigs/modsecurity.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'openssl_san.cnf.j2') %}
      apache/externalConfigs/openssl_san.cnf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'php-fpm.conf.j2') %}
      apache/externalConfigs/php-fpm.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'security2.conf.j2') %}
      apache/externalConfigs/security2.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'www.conf.j2') %}
      apache/externalConfigs/www.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'crs-setup.conf.j2') %}
      apache/externalConfigs/crs/crs-setup.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'dbDump.sh.j2') %}
      mysql/dbScripts/dbDump.sh
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'Dockerfile.j2') %}
      apache/Dockerfile
      {% elif _p.startswith(_one_shot_bundle_files_prefix) %}
      {{ _p[_one_shot_bundle_files_prefix | length:] }}
      {% elif _p.startswith(_one_shot_bundle_assets_prefix ~ 'audio/') %}
      _host_audio/{{ _p[(_one_shot_bundle_assets_prefix ~ 'audio/') | length:] }}
      {% elif _p.startswith(_one_shot_bundle_assets_prefix ~ 'video/') %}
      _host_video/{{ _p[(_one_shot_bundle_assets_prefix ~ 'video/') | length:] }}
      {% else %}
      {{ _p | basename }}
      {% endif %}

- name: Add individual file entries to source manifest mapping bundle_path->mtime+size
  ansible.builtin.set_fact:
    _one_shot_bundle_source_manifest: >-
      {{
        _one_shot_bundle_source_manifest
        | combine(((item.stat.mtime | string) ~ ':' ~ (item.stat.size | string)) | community.general.dict_kv(_one_shot_bundle_dest_file | trim))
      }}
    _one_shot_bundle_source_details: >-
      {{
        _one_shot_bundle_source_details
        | combine(({"path": item.stat.path, "mode": item.stat.mode, "size": item.stat.size, "mtime": item.stat.mtime}) | community.general.dict_kv(_one_shot_bundle_dest_file | trim))
      }}
  loop: "{{ _one_shot_bundle_inputs_paths_stat.results | selectattr('stat.isreg','defined') | selectattr('stat.isreg') | list }}"
  loop_control:
    label: "{{ item.stat.path }}"
  vars:
    _p: "{{ item.stat.path }}"
    _one_shot_bundle_dest_file: >-
      {% if _p.startswith(_one_shot_bundle_one_shot_bundle_prefix ~ '/') %}
      {{ _p[(_one_shot_bundle_one_shot_bundle_prefix ~ '/') | length:] }}
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'docker-compose.yml.j2') %}
      docker-compose.yml
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'entrypoint.sh.j2') %}
      apache/externalConfigs/entrypoint.sh
      {% elif _p == (_one_shot_bundle_templates_prefix ~ '.env.j2') %}
      apache/externalConfigs/.env
      {% elif _p == (_one_shot_bundle_templates_prefix ~ '.env.mysql.j2') %}
      mysql/externalConfigs/.env.mysql
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'apache2.conf.j2') %}
      apache/externalConfigs/apache2.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'default-ssl.conf.j2') %}
      apache/externalConfigs/default-ssl.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'gighive.htpasswd.j2') %}
      apache/externalConfigs/gighive.htpasswd
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'modsecurity.conf.j2') %}
      apache/externalConfigs/modsecurity.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'openssl_san.cnf.j2') %}
      apache/externalConfigs/openssl_san.cnf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'php-fpm.conf.j2') %}
      apache/externalConfigs/php-fpm.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'security2.conf.j2') %}
      apache/externalConfigs/security2.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'www.conf.j2') %}
      apache/externalConfigs/www.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'crs-setup.conf.j2') %}
      apache/externalConfigs/crs/crs-setup.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'Dockerfile.j2') %}
      apache/Dockerfile
      {% elif _p.startswith(_one_shot_bundle_files_prefix) %}
      {{ _p[_one_shot_bundle_files_prefix | length:] }}
      {% elif _p.startswith(_one_shot_bundle_assets_prefix ~ 'audio/') %}
      _host_audio/{{ _p[(_one_shot_bundle_assets_prefix ~ 'audio/') | length:] }}
      {% elif _p.startswith(_one_shot_bundle_assets_prefix ~ 'video/') %}
      _host_video/{{ _p[(_one_shot_bundle_assets_prefix ~ 'video/') | length:] }}
      {% else %}
      {{ _p | basename }}
      {% endif %}
  when: item.stat.exists | default(false)
