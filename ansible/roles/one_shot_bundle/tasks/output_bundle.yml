---

- name: Set fresh one-shot bundle output directory (controller)
  ansible.builtin.set_fact:
    _one_shot_bundle_output_dir: "/tmp/gighive-one-shot-bundle"

- name: Remove existing fresh one-shot bundle output directory (controller)
  delegate_to: localhost
  become: false
  ansible.builtin.file:
    path: "{{ _one_shot_bundle_output_dir }}"
    state: absent

- name: Create fresh one-shot bundle output directory (controller)
  delegate_to: localhost
  become: false
  ansible.builtin.file:
    path: "{{ _one_shot_bundle_output_dir }}"
    state: directory
    mode: "0755"

- name: Ensure destination directories exist for fresh one-shot bundle output (controller)
  delegate_to: localhost
  become: false
  ansible.builtin.file:
    path: "{{ _one_shot_bundle_output_dir }}/{{ _one_shot_bundle_dest_dir | trim }}"
    state: directory
    mode: "0755"
  loop: "{{ ((_one_shot_bundle_inputs_find_results.results | default([])) | map(attribute='files') | list | flatten) + ((_one_shot_bundle_inputs_paths_stat.results | default([])) | selectattr('stat.isreg','defined') | selectattr('stat.isreg') | map(attribute='stat') | list) }}"
  loop_control:
    label: "{{ item.path }}"
  vars:
    _p: "{{ item.path }}"
    _one_shot_bundle_dest_file: >-
      {% if _p == _one_shot_bundle_install_src %}
      install.sh
      {% elif _p.startswith(_one_shot_bundle_one_shot_bundle_prefix ~ '/') %}
      {{ _p[(_one_shot_bundle_one_shot_bundle_prefix ~ '/') | length:] }}
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'docker-compose.yml.j2') %}
      docker-compose.yml
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'entrypoint.sh.j2') %}
      apache/externalConfigs/entrypoint.sh
      {% elif _p == (_one_shot_bundle_templates_prefix ~ '.env.j2') %}
      apache/externalConfigs/.env
      {% elif _p == (_one_shot_bundle_templates_prefix ~ '.env.mysql.j2') %}
      mysql/externalConfigs/.env.mysql
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'apache2.conf.j2') %}
      apache/externalConfigs/apache2.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'default-ssl.conf.j2') %}
      apache/externalConfigs/default-ssl.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'gighive.htpasswd.j2') %}
      apache/externalConfigs/gighive.htpasswd
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'modsecurity.conf.j2') %}
      apache/externalConfigs/modsecurity.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'openssl_san.cnf.j2') %}
      apache/externalConfigs/openssl_san.cnf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'php-fpm.conf.j2') %}
      apache/externalConfigs/php-fpm.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'security2.conf.j2') %}
      apache/externalConfigs/security2.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'www.conf.j2') %}
      apache/externalConfigs/www.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'crs-setup.conf.j2') %}
      apache/externalConfigs/crs/crs-setup.conf
      {% elif _p.startswith(_one_shot_bundle_files_prefix) %}
      {{ _p[_one_shot_bundle_files_prefix | length:] }}
      {% elif _p.startswith(_one_shot_bundle_assets_prefix ~ 'audio/') %}
      _host_audio/{{ _p[(_one_shot_bundle_assets_prefix ~ 'audio/') | length:] }}
      {% elif _p.startswith(_one_shot_bundle_assets_prefix ~ 'video/') %}
      _host_video/{{ _p[(_one_shot_bundle_assets_prefix ~ 'video/') | length:] }}
      {% else %}
      {{ _p | basename }}
      {% endif %}
    _one_shot_bundle_dest_dir: "{{ _one_shot_bundle_dest_file | dirname }}"

- name: Render template files into fresh one-shot bundle output (controller)
  delegate_to: localhost
  become: false
  ansible.builtin.template:
    src: "{{ item.path }}"
    dest: "{{ _one_shot_bundle_output_dir }}/{{ _one_shot_bundle_dest_file | trim }}"
    mode: "{{ _one_shot_bundle_output_mode }}"
  loop: "{{ (_one_shot_bundle_inputs_find_results.results | default([])) | map(attribute='files') | list | flatten }}"
  loop_control:
    label: "{{ item.path }}"
  vars:
    _p: "{{ item.path }}"
    _one_shot_bundle_dest_file: >-
      {% if _p == (_one_shot_bundle_templates_prefix ~ 'docker-compose.yml.j2') %}
      docker-compose.yml
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'entrypoint.sh.j2') %}
      apache/externalConfigs/entrypoint.sh
      {% elif _p == (_one_shot_bundle_templates_prefix ~ '.env.j2') %}
      apache/externalConfigs/.env
      {% elif _p == (_one_shot_bundle_templates_prefix ~ '.env.mysql.j2') %}
      mysql/externalConfigs/.env.mysql
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'apache2.conf.j2') %}
      apache/externalConfigs/apache2.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'default-ssl.conf.j2') %}
      apache/externalConfigs/default-ssl.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'modsecurity.conf.j2') %}
      apache/externalConfigs/modsecurity.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'openssl_san.cnf.j2') %}
      apache/externalConfigs/openssl_san.cnf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'php-fpm.conf.j2') %}
      apache/externalConfigs/php-fpm.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'security2.conf.j2') %}
      apache/externalConfigs/security2.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'www.conf.j2') %}
      apache/externalConfigs/www.conf
      {% elif _p == (_one_shot_bundle_templates_prefix ~ 'crs-setup.conf.j2') %}
      apache/externalConfigs/crs/crs-setup.conf
      {% else %}
      {{ _p | basename }}
      {% endif %}
    _one_shot_bundle_output_mode: >-
      {% if _p == (_one_shot_bundle_templates_prefix ~ 'entrypoint.sh.j2') %}
      0755
      {% else %}
      {{ item.mode }}
      {% endif %}
  when:
    - item.path.startswith(_one_shot_bundle_templates_prefix)
    - item.path != (_one_shot_bundle_templates_prefix ~ 'gighive.htpasswd.j2')

- name: Copy existing gighive.htpasswd into fresh one-shot bundle output (controller)
  delegate_to: localhost
  become: false
  ansible.builtin.copy:
    src: "{{ one_shot_bundle_bundle_dir }}/apache/externalConfigs/gighive.htpasswd"
    dest: "{{ _one_shot_bundle_output_dir }}/apache/externalConfigs/gighive.htpasswd"
    mode: preserve

- name: Copy non-template files into fresh one-shot bundle output (controller)
  delegate_to: localhost
  become: false
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ _one_shot_bundle_output_dir }}/{{ _one_shot_bundle_dest_file | trim }}"
    mode: preserve
  loop: "{{ ((_one_shot_bundle_inputs_find_results.results | default([])) | map(attribute='files') | list | flatten) + ((_one_shot_bundle_inputs_paths_stat.results | default([])) | selectattr('stat.isreg','defined') | selectattr('stat.isreg') | map(attribute='stat') | list) }}"
  loop_control:
    label: "{{ item.path }}"
  vars:
    _p: "{{ item.path }}"
    _one_shot_bundle_dest_file: >-
      {% if _p == _one_shot_bundle_install_src %}
      install.sh
      {% elif _p.startswith(_one_shot_bundle_one_shot_bundle_prefix ~ '/') %}
      {{ _p[(_one_shot_bundle_one_shot_bundle_prefix ~ '/') | length:] }}
      {% elif _p.startswith(_one_shot_bundle_files_prefix) %}
      {{ _p[_one_shot_bundle_files_prefix | length:] }}
      {% elif _p.startswith(_one_shot_bundle_assets_prefix ~ 'audio/') %}
      _host_audio/{{ _p[(_one_shot_bundle_assets_prefix ~ 'audio/') | length:] }}
      {% elif _p.startswith(_one_shot_bundle_assets_prefix ~ 'video/') %}
      _host_video/{{ _p[(_one_shot_bundle_assets_prefix ~ 'video/') | length:] }}
      {% else %}
      {{ _p | basename }}
      {% endif %}
  when: not item.path.startswith(_one_shot_bundle_templates_prefix)

- name: Report fresh one-shot bundle output directory (controller source)
  ansible.builtin.debug:
    msg: "Fresh one-shot bundle written to {{ _one_shot_bundle_output_dir }}"

- name: Find files under fresh one-shot bundle output directory (controller)
  delegate_to: localhost
  become: false
  ansible.builtin.find:
    paths: "{{ _one_shot_bundle_output_dir }}"
    file_type: file
    recurse: true
    hidden: true
    patterns: "*"
    excludes:
      - "._*"
      - ".DS_Store"
  register: _one_shot_bundle_output_find_results

- name: Initialize fresh one-shot bundle output manifest dict
  ansible.builtin.set_fact:
    _one_shot_bundle_output_manifest: {}

- name: Add fresh one-shot bundle output file entries to manifest mapping bundle_path->mtime+size
  ansible.builtin.set_fact:
    _one_shot_bundle_output_manifest: >-
      {{
        _one_shot_bundle_output_manifest
        | combine(((item.mtime | string) ~ ':' ~ (item.size | string)) | community.general.dict_kv(_one_shot_bundle_output_relative_path))
      }}
  loop: "{{ _one_shot_bundle_output_find_results.files | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  vars:
    _one_shot_bundle_output_relative_path: "{{ item.path | regex_replace('^' ~ _one_shot_bundle_output_dir ~ '/', '') }}"

- name: Compute source files missing from fresh one-shot bundle output
  ansible.builtin.set_fact:
    _one_shot_bundle_output_missing_from_bundle: "{{ _one_shot_bundle_source_manifest.keys() | difference(_one_shot_bundle_output_manifest.keys()) | sort }}"
    _one_shot_bundle_output_extra_in_bundle: "{{ _one_shot_bundle_output_manifest.keys() | difference(_one_shot_bundle_source_manifest.keys()) | sort }}"

- name: Initialize changed paths between source and fresh one-shot bundle output
  ansible.builtin.set_fact:
    _one_shot_bundle_output_changed_between_source_and_bundle: []

- name: Compute changed paths between source and fresh one-shot bundle output
  ansible.builtin.set_fact:
    _one_shot_bundle_output_changed_between_source_and_bundle: "{{ _one_shot_bundle_output_changed_between_source_and_bundle + [item] }}"
  loop: "{{ _one_shot_bundle_source_manifest.keys() | intersect(_one_shot_bundle_output_manifest.keys()) | list }}"
  when: _one_shot_bundle_source_manifest[item] != _one_shot_bundle_output_manifest[item]

- name: Compute unchanged paths between source and fresh one-shot bundle output
  ansible.builtin.set_fact:
    _one_shot_bundle_output_unchanged_between_source_and_bundle: >-
      {{
        (_one_shot_bundle_source_manifest.keys() | intersect(_one_shot_bundle_output_manifest.keys()) | list)
        | difference(_one_shot_bundle_output_changed_between_source_and_bundle | default([]))
        | sort
      }}

- name: Show fresh one-shot bundle output validation counts (controller source)
  ansible.builtin.debug:
    msg:
      files_that_did_not_change: "{{ _one_shot_bundle_output_unchanged_between_source_and_bundle | default([]) | length }}"
      missing_from_bundle: "{{ _one_shot_bundle_output_missing_from_bundle | default([]) | length }}"
      extra_in_bundle: "{{ _one_shot_bundle_output_extra_in_bundle | default([]) | length }}"
      changed_between_source_and_bundle: "{{ _one_shot_bundle_output_changed_between_source_and_bundle | default([]) | length }}"

- name: Show fresh one-shot bundle output validation diffs (controller source)
  ansible.builtin.debug:
    msg:
      missing_from_bundle: "{{ _one_shot_bundle_output_missing_from_bundle | default([]) | sort }}"
      extra_in_bundle: "{{ _one_shot_bundle_output_extra_in_bundle | default([]) | sort }}"
      changed_between_source_and_bundle: "{{ _one_shot_bundle_output_changed_between_source_and_bundle | default([]) | sort }}"
