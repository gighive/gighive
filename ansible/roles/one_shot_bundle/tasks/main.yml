---

- name: Ensure apache downloads directory exists
  ansible.builtin.file:
    path: "{{ docker_dir }}/apache/downloads"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Read repo root VERSION for quickstart bundle
  delegate_to: localhost
  become: false
  ansible.builtin.slurp:
    src: "{{ repo_root }}/VERSION"
  register: _one_shot_bundle_repo_version_raw

- name: Write quickstart VERSION into one-shot bundle source
  delegate_to: localhost
  become: false
  ansible.builtin.copy:
    content: "{{ (_one_shot_bundle_repo_version_raw.content | b64decode).split('\n')[0] | trim }}_quickstart\n"
    dest: "{{ repo_root }}/ansible/roles/docker/files/one_shot_bundle/VERSION"
    mode: "0644"

- name: Monitor one-shot bundle inputs
  ansible.builtin.include_tasks: monitor.yml

- name: Output fresh one-shot bundle
  ansible.builtin.include_tasks: output_bundle.yml

- name: Show final one-shot bundle summary
  ansible.builtin.debug:
    msg:
      fresh_output_validation:
        counts:
          files_that_did_not_change: "{{ _one_shot_bundle_output_unchanged_between_source_and_bundle | default([]) | length }}"
          missing_from_existing_bundle: "{{ _one_shot_bundle_output_missing_from_existing_bundle | default([]) | length }}"
          extra_in_existing_bundle: "{{ _one_shot_bundle_output_extra_in_existing_bundle | default([]) | length }}"
          changed_between_source_and_bundle: "{{ _one_shot_bundle_output_changed_between_source_and_bundle | default([]) | length }}"
        paths:
          missing_from_existing_bundle: "{{ _one_shot_bundle_output_missing_from_existing_bundle | default([]) | sort }}"
          extra_in_existing_bundle: "{{ _one_shot_bundle_output_extra_in_existing_bundle | default([]) | sort }}"
          changed_between_source_and_bundle: "{{ _one_shot_bundle_output_changed_between_source_and_bundle | default([]) | sort }}"
