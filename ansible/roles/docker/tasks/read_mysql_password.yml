---
- name: Read MySQL root password from .env.mysql
  ansible.builtin.slurp:
    src: "{{ configs_dir }}/.env.mysql"
  register: __mysql_env_file
  no_log: true

- name: Extract MYSQL_ROOT_PASSWORD
  ansible.builtin.set_fact:
    mysql_root_password: "{{ (__mysql_env_file.content | b64decode).splitlines()
      | select('search', '^MYSQL_ROOT_PASSWORD=')
      | map('regex_replace', '^MYSQL_ROOT_PASSWORD=', '')
      | list | first }}"
  no_log: true
