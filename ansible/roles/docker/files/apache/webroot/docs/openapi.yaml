openapi: 3.0.0
info:
  title: 'GigHive API'
  description: 'GigHive media management API for uploading and retrieving audio/video files with event and asset metadata.'
  version: 1.0.0
paths:
  /uploads:
    post:
      tags:
        - uploads
      summary: 'Upload a media file'
      description: 'Accepts a media file and optional metadata. Stores file, records metadata, and links to a session (created if not present) identified by event_date + org_name. File type (audio/video) is inferred from MIME type and extension.'
      operationId: uploadMedia
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              required:
                - file
                - label
              properties:
                file:
                  description: 'The media file to upload (audio/video)'
                  type: string
                  format: binary
                event_date:
                  description: 'Event date (YYYY-MM-DD). Defaults to today if omitted'
                  type: string
                  format: date
                event_type:
                  description: 'Type of event. Defaults to band'
                  type: string
                  enum: [band, wedding]
                org_name:
                  description: 'Organization name (e.g. band name or wedding short name). Defaults by deployment'
                  type: string
                label:
                  description: 'Song title (band) or wedding table label. Required'
                  type: string
                participants:
                  description: 'Comma-separated participant names (musicians or guests)'
                  type: string
                keywords:
                  description: 'Keywords for searching and categorization'
                  type: string
                location:
                  description: 'Venue or location name'
                  type: string
                rating:
                  description: 'Optional rating value'
                  type: string
                notes:
                  description: 'Free-form notes'
                  type: string
              type: object
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResult'
        '400':
          description: 'Bad request (validation/mime/size)'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
        '409':
          description: 'Duplicate upload — a file with the same checksum already exists'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DuplicateError'
        '413':
          description: 'Payload too large'
        '415':
          description: 'Unsupported media type'
        '500':
          description: 'Server error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      servers:
        -
          url: /api
  '/uploads/{id}':
    get:
      tags:
        - uploads
      summary: 'Get uploaded file metadata'
      description: 'Handle GET /api/uploads/{id}'
      operationId: getUploadById
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/File'
        '404':
          description: 'Not found'
        '500':
          description: 'Server error'
      servers:
        -
          url: /api
  /uploads/finalize:
    post:
      tags:
        - uploads
      summary: 'Finalize a TUS chunked upload'
      description: 'Finalizes a completed TUS chunked upload. The client calls this after the last TUS PATCH 204. The server reads the tusd post-finish hook output and runs the same ingestion pipeline as POST /uploads. Metadata fields supplement or override TUS upload metadata. Idempotent via a per-upload_id finalization marker.'
      operationId: finalizeTusUpload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - upload_id
              properties:
                upload_id:
                  description: 'The TUS upload ID returned by the TUS creation response'
                  type: string
                  pattern: '^[A-Za-z0-9_-]+$'
                event_date:
                  description: 'Event date (YYYY-MM-DD). Falls back to TUS metadata if omitted'
                  type: string
                  format: date
                event_type:
                  type: string
                  enum: [band, wedding]
                org_name:
                  type: string
                label:
                  type: string
                participants:
                  type: string
                keywords:
                  type: string
                location:
                  type: string
                rating:
                  type: string
                notes:
                  type: string
              type: object
      responses:
        '201':
          description: 'Created — ingestion complete'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResult'
        '400':
          description: 'Bad request (missing upload_id, upload not found, empty file, etc.)'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
        '409':
          description: 'Duplicate upload — a file with the same checksum already exists'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DuplicateError'
        '500':
          description: 'Server error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      servers:
        -
          url: /api
  /media-files:
    get:
      tags:
        - uploads
      summary: 'List media files (not yet implemented)'
      description: 'Planned endpoint. Currently returns 501 Not Implemented.'
      operationId: listMediaFilesStub
      responses:
        '501':
          description: 'Not Implemented'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      servers:
        -
          url: /api
    post:
      tags:
        - uploads
      summary: 'Upload a media file (iOS alias for POST /uploads)'
      description: 'Alias for POST /uploads. Accepts identical request body and returns an identical response. Provided for iOS client compatibility.'
      operationId: uploadMediaAlias
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              required:
                - file
                - label
              properties:
                file:
                  description: 'The media file to upload (audio/video)'
                  type: string
                  format: binary
                event_date:
                  description: 'Event date (YYYY-MM-DD). Defaults to today if omitted'
                  type: string
                  format: date
                event_type:
                  type: string
                  enum: [band, wedding]
                org_name:
                  type: string
                label:
                  description: 'Song title (band) or wedding table label. Required'
                  type: string
                participants:
                  type: string
                keywords:
                  type: string
                location:
                  type: string
                rating:
                  type: string
                notes:
                  type: string
              type: object
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResult'
        '400':
          description: 'Bad request'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
        '409':
          description: 'Duplicate upload'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DuplicateError'
        '413':
          description: 'Payload too large'
        '500':
          description: 'Server error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      servers:
        -
          url: /api
  /database.php:
    get:
      tags:
        - database
      summary: 'Get media list'
      description: 'Returns a list of all media files with metadata. Can return HTML view or JSON based on format parameter.'
      operationId: getMediaList
      parameters:
        -
          name: format
          in: query
          description: "Response format. If 'json', returns JSON array; otherwise returns HTML view"
          required: false
          schema:
            type: string
            enum:
              - json
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                properties:
                  entries: { type: array, items: { $ref: '#/components/schemas/MediaEntry' } }
                type: object
            text/html:
              schema:
                description: 'HTML page with media list'
                type: string
        '500':
          description: 'Server error'
      servers:
        -
          url: /db
  /import_manifest_upload_finalize.php:
    post:
      tags:
        - admin
      summary: 'Finalize a manifest TUS upload (admin)'
      description: 'Admin-only endpoint. Finalizes the TUS upload for a single file within a manifest import job. The manifest row (created by the manifest worker Step 1) must already exist in the database before calling this endpoint. Idempotent via per-upload_id finalization markers. Requires HTTP Basic authentication with the admin user.'
      operationId: finalizeManifestUpload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - job_id
                - upload_id
                - checksum_sha256
              properties:
                job_id:
                  description: 'Import job ID (format YYYYMMDD-HHMMSS-{12hex})'
                  type: string
                  pattern: '^\d{8}-\d{6}-[0-9a-f]{12}$'
                upload_id:
                  description: 'TUS upload ID'
                  type: string
                  pattern: '^[A-Za-z0-9_-]+$'
                checksum_sha256:
                  description: 'Expected SHA-256 checksum of the uploaded file'
                  type: string
                  pattern: '^[0-9a-f]{64}$'
              type: object
      responses:
        '200':
          description: 'Finalize succeeded'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManifestFinalizeResult'
        '400':
          description: 'Bad request or finalize error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManifestFinalizeError'
        '403':
          description: 'Forbidden — admin access required'
        '404':
          description: 'Job not found'
        '405':
          description: 'Method not allowed'
      servers:
        -
          url: /admin
  /ai_jobs.php:
    get:
      tags:
        - ai
      summary: 'List AI jobs, get a single job, or get status counts'
      description: 'Variants: no params → paginated list (?status, ?limit); ?id=N → single job; ?action=status_counts → aggregate counts by status (?job_ids=1,2,3 scopes to those jobs; omit for global). Admin required for status_counts.'
      operationId: getAiJobs
      parameters:
        -
          name: id
          in: query
          required: false
          schema:
            type: integer
        -
          name: action
          in: query
          required: false
          schema:
            type: string
            enum:
              - status_counts
        -
          name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - queued
              - running
              - done
              - failed
        -
          name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
            maximum: 500
        -
          name: job_ids
          in: query
          description: 'Comma-separated job IDs (for action=status_counts)'
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK
        '403':
          description: 'Forbidden — admin required'
        '404':
          description: 'Job not found'
      servers:
        -
          url: /api
    post:
      tags:
        - ai
      summary: 'Enqueue or cancel AI jobs (admin)'
      description: 'action omitted → enqueue single job (body: job_type, target_type, target_id); action=enqueue_all_untagged → bulk enqueue all untagged videos; action=retag_all → re-enqueue all videos including already-tagged; action=cancel_jobs → cancel queued jobs by ID (body: job_ids[]).'
      operationId: postAiJobs
      parameters:
        -
          name: action
          in: query
          required: false
          schema:
            type: string
            enum:
              - enqueue_all_untagged
              - retag_all
              - cancel_jobs
      requestBody:
        required: false
        content:
          application/json:
            schema:
              properties:
                job_type:
                  type: string
                  example: categorize_video
                target_type:
                  type: string
                  example: asset
                target_id:
                  description: 'Required when action is omitted'
                  type: integer
                job_ids:
                  description: 'Required for action=cancel_jobs'
                  type: array
                  items: { type: integer }
              type: object
      responses:
        '200':
          description: 'Already queued (single enqueue) or cancel result'
        '201':
          description: 'Job enqueued'
        '400':
          description: 'Bad request or AI_WORKER_ENABLED=false'
        '403':
          description: 'Admin required'
      servers:
        -
          url: /api
  /tags.php:
    get:
      tags:
        - tags
      summary: 'List tags or fetch taggings for a target'
      description: 'No target params → tag list (optionally ?namespace=X with usage counts); ?target_type=asset&target_id=N → taggings for one asset; ?target_type=asset&asset_ids=1,2,3 → batch taggings map keyed by asset ID.'
      operationId: getTags
      parameters:
        -
          name: namespace
          in: query
          required: false
          schema:
            type: string
        -
          name: target_type
          in: query
          required: false
          schema:
            type: string
            example: asset
        -
          name: target_id
          in: query
          required: false
          schema:
            type: integer
        -
          name: asset_ids
          in: query
          description: 'Comma-separated asset IDs for batch tagging fetch'
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK
        '405':
          description: 'Method not allowed'
      servers:
        -
          url: /api
  /taggings.php:
    post:
      tags:
        - tags
      summary: 'Create a manual tagging (admin)'
      operationId: createTagging
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - target_type
                - target_id
                - namespace
                - name
              properties:
                target_type:
                  type: string
                  enum: [asset, event, event_item, segment]
                target_id:
                  type: integer
                namespace:
                  type: string
                name:
                  type: string
                confidence:
                  type: number
                  default: 1
                  maximum: 1
                  minimum: 0
              type: object
      responses:
        '201':
          description: Created
        '400':
          description: 'Validation error'
        '403':
          description: 'Admin required'
      servers:
        -
          url: /api
    delete:
      tags:
        - tags
      summary: 'Remove a tagging (admin)'
      operationId: deleteTagging
      parameters:
        -
          name: id
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted
        '400':
          description: 'id required'
        '403':
          description: 'Admin required'
      servers:
        -
          url: /api
    patch:
      tags:
        - tags
      summary: 'Confirm or edit a tagging (admin)'
      operationId: patchTagging
      parameters:
        -
          name: id
          in: query
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                source:
                  type: string
                  enum: [ai, human]
                confidence:
                  type: number
                  maximum: 1
                  minimum: 0
                namespace:
                  type: string
                name:
                  type: string
              type: object
      responses:
        '200':
          description: Updated
        '400':
          description: 'id required'
        '403':
          description: 'Admin required'
        '404':
          description: 'Tagging not found'
      servers:
        -
          url: /api
  /upload-token.php:
    get:
      tags:
        - uploads
      summary: 'Validate an event upload token'
      description: 'Returns event context for a valid token. Used by guest upload clients to resolve event metadata before uploading.'
      operationId: validateUploadToken
      parameters:
        -
          name: token
          in: query
          required: true
          schema:
            type: string
            maxLength: 128
      responses:
        '200':
          description: 'Valid token'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadToken'
        '400':
          description: 'Missing or oversized token'
        '404':
          description: 'Invalid or expired token'
      servers:
        -
          url: /api
  /guest-status.php:
    get:
      tags:
        - guest
      summary: 'Check moderation status for a guest upload'
      description: 'Returns the moderation status of the upload identified by the nonce, plus event name, approved video count, and gallery days remaining.'
      operationId: getGuestStatus
      parameters:
        -
          name: nonce
          in: query
          required: true
          schema:
            type: string
            maxLength: 40
            minLength: 30
            pattern: '^[A-Za-z0-9_\-]+$'
      responses:
        '200':
          description: OK
        '400':
          description: 'Invalid nonce format'
        '404':
          description: 'Nonce not found'
      servers:
        -
          url: /api
  /guest-gallery.php:
    get:
      tags:
        - guest
      summary: 'List approved gallery videos for a guest'
      description: 'Returns all approved videos for the event associated with the nonce. Requires the nonce owner to also be approved. Returns expired status with empty video list if gallery has expired.'
      operationId: getGuestGallery
      parameters:
        -
          name: nonce
          in: query
          required: true
          schema:
            type: string
            maxLength: 40
            minLength: 30
            pattern: '^[A-Za-z0-9_\-]+$'
      responses:
        '200':
          description: 'OK — includes status, days_remaining, and videos array of GuestVideo'
        '400':
          description: 'Invalid nonce format'
        '403':
          description: 'Forbidden — nonce not approved'
      servers:
        -
          url: /api
  /guest-stream.php:
    get:
      tags:
        - guest
      summary: 'Stream an approved video for a guest (supports HTTP range requests)'
      description: 'Streams video/mp4. Requires the nonce owner to be approved and the requested job_id to belong to the same event. Supports Range header for seeking.'
      operationId: streamGuestVideo
      parameters:
        -
          name: nonce
          in: query
          required: true
          schema:
            type: string
            maxLength: 40
            minLength: 30
        -
          name: job_id
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: 'Full video stream (video/mp4)'
        '206':
          description: 'Partial content (range request)'
        '400':
          description: 'Invalid nonce or job_id'
        '403':
          description: 'Forbidden or gallery expired'
        '404':
          description: 'Video not found'
      servers:
        -
          url: /api
  /guest-report.php:
    post:
      tags:
        - guest
      summary: 'Flag a video for moderation review'
      description: 'Allows an approved guest to flag another approved video in the same event. Sets guest_flagged=1 on the upload_jobs row. Idempotent — repeat calls update guest_flagged_at.'
      operationId: reportGuestVideo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - nonce
                - upload_job_id
              properties:
                nonce:
                  type: string
                upload_job_id:
                  type: integer
                  minimum: 1
              type: object
      responses:
        '200':
          description: 'Flagged successfully'
        '400':
          description: 'Invalid request body'
        '403':
          description: 'Forbidden — nonce not approved or video not in same event'
      servers:
        -
          url: /api
  /guest-delete.php:
    post:
      tags:
        - guest
      summary: "Soft-delete the current guest's own uploaded video"
      description: 'Sets guest_deleted=1; moderation_status unchanged so gallery access is preserved. Idempotent — repeat calls update guest_deleted_at. Pre-approval uploads (pending/rejected) cannot be deleted via this endpoint.'
      operationId: deleteGuestVideo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - nonce
                - upload_job_id
              properties:
                nonce:
                  type: string
                  maxLength: 40
                  minLength: 30
                  pattern: '^[A-Za-z0-9_\-]+$'
                upload_job_id:
                  description: "upload_jobs.id (integer PK) of the guest's own upload"
                  type: integer
                  minimum: 1
              type: object
      responses:
        '200':
          description: 'Soft-deleted successfully'
        '400':
          description: 'Invalid request body — malformed nonce or non-positive upload_job_id'
        '403':
          description: "Forbidden — nonce not approved, nonce not found, or attempting to delete another guest's video"
      servers:
        -
          url: /api
  /admin_system_stats.php:
    get:
      tags:
        - admin
      summary: 'Get live system stats (admin)'
      description: 'Returns DB counts, media file stats, host disk/memory, and apache container network I/O. Used by the Live mode toggle on the admin system page. Note: incurs a ~1-second server-side delay for the network sample.'
      operationId: getSystemStats
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemStats'
        '403':
          description: 'Forbidden — admin access required'
        '405':
          description: 'Method not allowed'
        '500':
          description: 'Server error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      servers:
        -
          url: /admin
components:
  schemas:
    File:
      properties:
        id:
          type: integer
          format: int64
        file_name:
          type: string
        file_type:
          type: string
          enum:
            - audio
            - video
        duration_seconds:
          type: number
          nullable: true
        mime_type:
          type: string
        size_bytes:
          type: integer
          format: int64
          nullable: true
        checksum_sha256:
          type: string
          nullable: true
        asset_id:
          type: integer
          format: int64
          nullable: true
        event_id:
          type: integer
          format: int64
          nullable: true
        source_relpath:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
      type: object
    UploadResult:
      description: 'Response returned by POST /uploads and POST /uploads/finalize'
      allOf:
        -
          $ref: '#/components/schemas/File'
        -
          properties:
            event_date:
              type: string
              format: date
            org_name:
              type: string
            event_type:
              type: string
              enum:
                - band
                - wedding
            label:
              type: string
            participants:
              type: string
            keywords:
              type: string
            delete_token:
              description: 'One-time delete token. Present only on new uploads; absent if the record already existed'
              type: string
              nullable: true
          type: object
    MediaEntry:
      description: 'Media entry with session and song metadata'
      properties:
        id:
          type: integer
          format: int64
        index:
          description: 'Sequential index in the list'
          type: integer
        date:
          description: 'Event/session date'
          type: string
          format: date
        org_name:
          description: 'Organization or band name'
          type: string
        duration:
          description: 'Human-readable duration (HH:MM:SS)'
          type: string
        duration_seconds:
          description: 'Duration in seconds'
          type: integer
        song_title:
          description: 'Song or event label'
          type: string
        file_type:
          type: string
          enum:
            - audio
            - video
        file_name:
          type: string
        url:
          description: 'Relative URL to the media file'
          type: string
      type: object
    Error:
      properties:
        error:
          type: string
        message:
          type: string
      type: object
    DuplicateError:
      properties:
        error:
          type: string
          example: 'Duplicate Upload'
        message:
          type: string
        existing_asset_id:
          type: integer
          format: int64
        checksum_sha256:
          type: string
      type: object
    ManifestFinalizeResult:
      properties:
        success:
          type: boolean
          example: true
        job_id:
          type: string
        checksum_sha256:
          type: string
        state:
          type: string
          enum:
            - db_done
            - thumbnail_done
            - uploaded
            - already_present
        file_name:
          type: string
          nullable: true
        duration_seconds:
          type: number
          nullable: true
        thumbnail_done:
          type: boolean
        db_done:
          type: boolean
        all_done:
          description: 'True when all files in the job have reached a terminal state'
          type: boolean
        trace:
          type: array
          items:
            type: object
      type: object
    ManifestFinalizeError:
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
        message:
          type: string
        failure_code:
          type: string
          enum:
            - disk_full
            - checksum_mismatch
            - db_error
            - thumbnail_error
            - invalid_manifest_state
            - finalize_error
        retryable:
          type: boolean
          nullable: true
        diagnostics:
          properties:
            tus_data_path:
              type: string
            tus_data_free_bytes:
              type: integer
              nullable: true
            tus_data_total_bytes:
              type: integer
              nullable: true
            tus_data_pct_used:
              type: number
              nullable: true
            media_file_exists:
              type: boolean
            media_file_path:
              type: string
            thumbnail_exists:
              type: boolean
              nullable: true
            hook_payload_exists:
              type: boolean
              nullable: true
          type: object
          nullable: true
        trace:
          type: array
          items:
            type: object
      type: object
    AiJob:
      properties:
        id:
          type: integer
          format: int64
        job_type:
          type: string
          example: categorize_video
        target_type:
          type: string
          example: asset
        target_id:
          type: integer
          format: int64
        status:
          type: string
          enum:
            - queued
            - running
            - done
            - failed
        error_message:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
          nullable: true
      type: object
    Tag:
      properties:
        id:
          type: integer
          format: int64
        namespace:
          type: string
        name:
          type: string
        usage_count:
          type: integer
      type: object
    Tagging:
      properties:
        id:
          type: integer
          format: int64
        namespace:
          type: string
        name:
          type: string
        confidence:
          type: number
          format: float
        source:
          type: string
          enum:
            - ai
            - human
        start_seconds:
          type: number
          nullable: true
        end_seconds:
          type: number
          nullable: true
        run_id:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
      type: object
    UploadToken:
      properties:
        event_id:
          type: integer
          format: int64
        event_date:
          type: string
          format: date
        org_name:
          type: string
        event_type:
          type: string
          enum:
            - band
            - wedding
      type: object
    GuestVideo:
      properties:
        upload_job_id:
          type: integer
          format: int64
        label:
          type: string
        stream_url:
          type: string
        display_name:
          type: string
          nullable: true
        approved_at:
          type: string
          format: date-time
      type: object
    SystemStats:
      properties:
        success:
          type: boolean
        db:
          description: 'Database summary. Null if DB is unreachable.'
          properties:
            version:
              type: string
            db_name:
              type: string
            size_bytes:
              type: integer
              format: int64
            counts:
              description: 'Row count per table (events, assets, event_items, participants, tags, taggings)'
              type: object
          type: object
          nullable: true
        media:
          description: 'File counts and byte totals per media type. Null if MEDIA_SEARCH_DIRS is unset.'
          properties:
            audio:
              properties:
                count:
                  type: integer
                bytes:
                  type: integer
                  format: int64
              type: object
            video:
              properties:
                count:
                  type: integer
                bytes:
                  type: integer
                  format: int64
              type: object
            thumbnails:
              properties:
                count:
                  type: integer
                bytes:
                  type: integer
                  format: int64
              type: object
            total:
              properties:
                count:
                  type: integer
                bytes:
                  type: integer
                  format: int64
              type: object
          type: object
          nullable: true
        disk:
          description: 'Host filesystem free/total via bind-mounted media paths (deduplicated by device ID).'
          type: array
          items:
            properties:
              free_bytes:
                type: integer
                format: int64
              total_bytes:
                type: integer
                format: int64
            type: object
          nullable: true
        memory:
          description: 'Host RAM via /proc/meminfo.'
          properties:
            total_bytes:
              type: integer
              format: int64
            available_bytes:
              type: integer
              format: int64
          type: object
          nullable: true
        network:
          description: 'Per-interface rx/tx bytes/sec for the apache container (1-second sample).'
          type: array
          items:
            properties:
              iface:
                type: string
              rx_bps:
                type: integer
              tx_bps:
                type: integer
            type: object
          nullable: true
      type: object
