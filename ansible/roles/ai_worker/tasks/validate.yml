---
- name: AI worker | verify container is running
  community.docker.docker_container_info:
    name: ai-worker
  register: __ai_container
  failed_when: not (__ai_container.container.State.Running | default(false))
  when: ai_worker_enabled | bool

- name: AI worker | stat ai_assets subdirectories
  ansible.builtin.stat:
    path: "{{ gighive_home }}/ai_assets/{{ item }}"
  register: __ai_dir_stats
  loop:
    - frames
    - diagnostics
    - thumbnails
  when: ai_worker_enabled | bool

- name: AI worker | assert ai_assets directories exist, are owned correctly, and are writable
  ansible.builtin.assert:
    that:
      - item.stat.exists
      - item.stat.isdir
      - item.stat.pw_name == ansible_user
      - item.stat.writeable
    fail_msg: >-
      {{ item.item }} — exists={{ item.stat.exists | default(false) }}
      isdir={{ item.stat.isdir | default(false) }}
      owner={{ item.stat.pw_name | default('unknown') }}
      writable={{ item.stat.writeable | default(false) }}
  loop: "{{ __ai_dir_stats.results }}"
  when: ai_worker_enabled | bool

- name: AI worker | read MySQL root password
  ansible.builtin.include_role:
    name: docker
    tasks_from: read_mysql_password
  when: ai_worker_enabled | bool

- name: AI worker | verify AI tables exist in database
  ansible.builtin.shell: |
    CID=$(docker ps --format "{{ '{{' }}.Names{{ '}}' }}" | grep mysql | head -1)
    docker exec -e "MYSQL_PWD=$MYSQL_ROOT_PW" "$CID" mysql -u root "{{ mysql_database }}" -sN -e \
      "SELECT COUNT(*) FROM information_schema.tables
       WHERE table_schema='{{ mysql_database }}'
       AND table_name IN ('ai_jobs','helper_runs','derived_assets','tags','taggings');"
  environment:
    MYSQL_ROOT_PW: "{{ mysql_root_password }}"
  register: __ai_tables
  until: __ai_tables.rc == 0 and (__ai_tables.stdout | trim | int) == 5
  retries: 12
  delay: 10
  failed_when: (__ai_tables.stdout | trim | int) != 5
  changed_when: false
  when: ai_worker_enabled | bool

- name: AI worker | verify OPENAI_API_KEY is non-empty
  ansible.builtin.assert:
    that: openai_api_key is defined and openai_api_key | length > 0
    fail_msg: "openai_api_key must be set in secrets.yml when ai_worker_enabled=true"
  when: ai_worker_enabled | bool

- name: AI worker | job queue round-trip (insert → mark done → verify → cleanup)
  ansible.builtin.shell: |
    CID=$(docker ps --format "{{ '{{' }}.Names{{ '}}' }}" | grep mysql | head -1)
    dexec_sql() { docker exec -e "MYSQL_PWD=$MYSQL_ROOT_PW" "$CID" mysql -u root "{{ mysql_database }}" -sN -e "$1"; }
    dexec_sql "DELETE FROM ai_jobs WHERE job_type='smoke_test' AND target_id=0;" 2>/dev/null || true
    ID=$(dexec_sql "INSERT INTO ai_jobs (job_type,target_type,target_id,status)
                    VALUES ('smoke_test','asset',0,'queued'); SELECT LAST_INSERT_ID();")
    dexec_sql "UPDATE ai_jobs SET status='done' WHERE id=$ID;"
    STATUS=$(dexec_sql "SELECT status FROM ai_jobs WHERE id=$ID;")
    dexec_sql "DELETE FROM ai_jobs WHERE id=$ID;"
    if [ "$STATUS" != "done" ]; then echo "FAIL: status=$STATUS"; exit 1; fi
    echo "OK: round-trip id=$ID status=$STATUS"
  environment:
    MYSQL_ROOT_PW: "{{ mysql_root_password }}"
  register: __smoke_roundtrip
  until: __smoke_roundtrip.rc == 0
  retries: 12
  delay: 10
  changed_when: false
  when: ai_worker_enabled | bool
