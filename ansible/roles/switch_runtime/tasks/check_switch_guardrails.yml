---
- name: Assert bundle runtime is extracted for switch modes
  ansible.builtin.assert:
    that:
      - switch_bundle_extract_exists | default(false) | bool
    fail_msg: >-
      Bundle runtime directory does not exist at {{ switch_bundle_extract_dir }}.
      Run Phase 2 preparation first.
  when: switch_target_mode in ['gighive_bundle', 'gighive2_vm']

- name: Assert docker daemon is reachable for switch modes
  ansible.builtin.command: docker info
  register: switch_docker_info
  changed_when: false
  failed_when: switch_docker_info.rc != 0
  when: switch_target_mode in ['gighive_bundle', 'gighive2_vm']

- name: Assert bundle runtime is initialized before switch modes
  ansible.builtin.assert:
    that:
      - switch_bundle_initialized | default(false) | bool
    fail_msg: >-
      Bundle runtime is not initialized at {{ switch_bundle_extract_dir }}.
      Run install.sh manually before attempting a switch.
  when: switch_target_mode in ['gighive_bundle', 'gighive2_vm']

- name: Assert requested bundle target is not blocked by an unhealthy already-running bundle
  ansible.builtin.assert:
    that:
      - not (switch_bundle_containers_running | default(false) | bool) or (switch_bundle_health_ok | default(false) | bool)
    fail_msg: >-
      Bundle containers are already running but the bundle health check is failing.
      Refusing gighive_bundle switch until the existing bundle runtime is healthy or stopped.
  when: switch_target_mode == 'gighive_bundle'

- name: Assert requested VM target is not already satisfied by a dual-active state
  ansible.builtin.assert:
    that:
      - not ((switch_vm_is_running | default(false) | bool) and (switch_bundle_containers_running | default(false) | bool))
    fail_msg: >-
      Both gighive2 VM and bundle runtime appear active before switching to gighive2_vm.
      Refusing to proceed until the active state is made unambiguous.
  when: switch_target_mode == 'gighive2_vm'

- name: Assert requested VM target is not already active with host ports still busy
  ansible.builtin.assert:
    that:
      - not (switch_vm_is_running | default(false) | bool) or not (switch_host_ports_busy | default(false) | bool) or (switch_bundle_containers_running | default(false) | bool)
    fail_msg: >-
      gighive2 VM already appears to be running while required host ports {{ switch_host_ports_in_use | default([]) }} are also occupied.
      Refusing to proceed because the current runtime ownership is inconsistent.
  when: switch_target_mode == 'gighive2_vm'

- name: Assert requested bundle target is not already satisfied by an unhealthy dual-active state
  ansible.builtin.assert:
    that:
      - not ((switch_vm_is_running | default(false) | bool) and (switch_bundle_containers_running | default(false) | bool) and not (switch_bundle_health_ok | default(false) | bool))
    fail_msg: >-
      Both runtimes appear active, but the bundle health check is failing.
      Refusing to switch to gighive_bundle until the current state is corrected.
  when: switch_target_mode == 'gighive_bundle'
