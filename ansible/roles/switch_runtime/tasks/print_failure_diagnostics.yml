---
- name: Print switch failure diagnostics
  ansible.builtin.debug:
    msg:
      - "============================================================"
      - "  GigHive Runtime Failure Diagnostics"
      - "============================================================"
      - "  mode requested       : {{ switch_target_mode }}"
      - "  action taken         : {{ switch_action_taken | default('none') }}"
      - "  failed task          : {{ ansible_failed_task.name | default('unknown') }}"
      - "  failure detail       : {{ ansible_failed_result.msg | default(ansible_failed_result.stderr | default(ansible_failed_result.stdout | default('unknown'))) }}"
      - "  initial vm_state     : {{ switch_initial_vm_state | default('unknown') }}"
      - "  initial vm_running   : {{ switch_initial_vm_running | default(false) }}"
      - "  initial bundle_run   : {{ switch_initial_bundle_running | default(false) }}"
      - "  initial bundle_ok    : {{ switch_initial_bundle_health_ok | default(false) }}"
      - "  initial host ports   : {{ switch_initial_host_ports_in_use | default([]) | join(', ') if (switch_initial_host_ports_in_use | default([]) | length > 0) else 'none' }}"
      - "============================================================"
