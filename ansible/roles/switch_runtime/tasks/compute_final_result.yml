---
- name: Compute final runtime result fact
  ansible.builtin.set_fact:
    switch_vm_ready: >-
      {{
        (switch_vm_is_running | default(false)) and
        (switch_vm_ssh_ok | default(false)) and
        (switch_vm_app_ok | default(false))
      }}
    switch_bundle_ready: >-
      {{
        (switch_bundle_containers_running | default(false)) and
        (switch_bundle_health_ok | default(false))
      }}
    switch_final_result: >-
      {{
        'success' if (
          (switch_target_mode == 'status') or
          (switch_target_mode == 'gighive2_vm' and
            (switch_vm_is_running | default(false)) and
            (switch_vm_ssh_ok | default(false)) and
            (switch_vm_app_ok | default(false)) and
            not (switch_bundle_containers_running | default(false))) or
          (switch_target_mode == 'gighive_bundle' and
            (switch_bundle_containers_running | default(false)) and
            (switch_bundle_health_ok | default(false)) and
            not (switch_vm_is_running | default(false)))
        ) else 'incomplete'
      }}
