---
- name: Derive switch_vbox_user from controller login environment
  ansible.builtin.set_fact:
    switch_vbox_user: >-
      {{
        (lookup('env', 'SUDO_USER') | default('') | trim)
          if (lookup('env', 'SUDO_USER') | default('') | trim) | length > 0
          else (lookup('env', 'USER') | default('') | trim)
      }}

- name: Fallback to id -un for switch_vbox_user if env vars not set
  ansible.builtin.command: id -un
  register: switch_vbox_user_id
  changed_when: false
  become: false
  when: (switch_vbox_user | default('') | trim) | length == 0

- name: Set switch_vbox_user from id -un fallback
  ansible.builtin.set_fact:
    switch_vbox_user: "{{ switch_vbox_user_id.stdout | trim }}"
  when:
    - (switch_vbox_user | default('') | trim) | length == 0
    - switch_vbox_user_id is defined
    - (switch_vbox_user_id.stdout | default('') | trim) | length > 0

- name: Assert switch_vbox_user is resolved
  ansible.builtin.assert:
    that:
      - (switch_vbox_user | default('') | trim) | length > 0
    fail_msg: >-
      Could not determine the VirtualBox controller user from
      SUDO_USER, USER, or id -un

- name: Lookup switch_vbox_user passwd entry
  ansible.builtin.command: "getent passwd {{ switch_vbox_user }}"
  register: switch_vbox_passwd
  changed_when: false

- name: Derive switch_vbox_uid and switch_vbox_home from passwd
  ansible.builtin.set_fact:
    switch_vbox_uid: "{{ switch_vbox_passwd.stdout.split(':')[2] | default('') }}"
    switch_vbox_home: "{{ switch_vbox_passwd.stdout.split(':')[5] | default('') }}"

- name: Assert switch_vbox_uid and switch_vbox_home are resolvable
  ansible.builtin.assert:
    that:
      - (switch_vbox_uid | default('') | trim) | length > 0
      - (switch_vbox_home | default('') | trim) | length > 0
    fail_msg: >-
      Could not resolve uid/home for switch_vbox_user={{ switch_vbox_user }}
      via getent passwd

- name: Set switch_vbox_user_home_config (VBOX_USER_HOME)
  ansible.builtin.set_fact:
    switch_vbox_user_home_config: "{{ switch_vbox_home }}/.config/VirtualBox"

- name: Print derived VBox context
  ansible.builtin.debug:
    msg:
      - "switch_vbox_user             : {{ switch_vbox_user }}"
      - "switch_vbox_uid              : {{ switch_vbox_uid }}"
      - "switch_vbox_home             : {{ switch_vbox_home }}"
      - "switch_vbox_user_home_config : {{ switch_vbox_user_home_config }}"
