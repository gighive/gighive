---
- name: Wait for {{ switch_vm_name }} to reach poweroff state
  ansible.builtin.command: >
    /usr/bin/VBoxManage showvminfo "{{ switch_vm_name }}" --machinereadable
  become: true
  become_user: "{{ switch_vbox_user }}"
  environment:
    HOME: "{{ switch_vbox_home }}"
    VBOX_USER_HOME: "{{ switch_vbox_user_home_config }}"
  register: switch_vm_poweroff_wait
  changed_when: false
  failed_when: false
  retries: "{{ switch_vm_poweroff_retries }}"
  delay: "{{ switch_vm_poweroff_delay_seconds }}"
  until: >-
    switch_vm_poweroff_wait.rc == 0 and
    'VMState="poweroff"' in (switch_vm_poweroff_wait.stdout | default('')) and
    'VMState="running"' not in (switch_vm_poweroff_wait.stdout | default(''))
  when: switch_vm_is_running | default(false) | bool
