---
- name: Check for VBoxHeadless processes on Pop!_OS host
  ansible.builtin.command: pgrep -a VBoxHeadless
  register: switch_vbox_headless_procs
  changed_when: false
  failed_when: false

- name: Check for VirtualBoxVM processes on Pop!_OS host
  ansible.builtin.command: pgrep -a VirtualBoxVM
  register: switch_vbox_vm_procs
  changed_when: false
  failed_when: false

- name: Summarise VirtualBox host processes
  ansible.builtin.set_fact:
    switch_vbox_headless_running: "{{ switch_vbox_headless_procs.rc == 0 }}"
    switch_vbox_vm_proc_running: "{{ switch_vbox_vm_procs.rc == 0 }}"
