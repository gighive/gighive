---
- name: Assert bundle runtime is extracted for switch modes
  ansible.builtin.assert:
    that:
      - switch_bundle_extract_exists | default(false) | bool
    fail_msg: >-
      Bundle runtime directory does not exist at {{ switch_bundle_extract_dir }}.
      Run Phase 2 preparation first.
  when: switch_target_mode in ['gighive_bundle', 'gighive2_vm']

- name: Assert docker daemon is reachable for switch modes
  ansible.builtin.command: docker info
  register: switch_docker_info
  changed_when: false
  failed_when: switch_docker_info.rc != 0
  when: switch_target_mode in ['gighive_bundle', 'gighive2_vm']

- name: Assert bundle runtime is initialized before switch modes
  ansible.builtin.assert:
    that:
      - switch_bundle_initialized | default(false) | bool
    fail_msg: >-
      Bundle runtime is not initialized at {{ switch_bundle_extract_dir }}.
      Run install.sh manually before attempting a switch.
  when: switch_target_mode in ['gighive_bundle', 'gighive2_vm']

- name: Assert requested bundle target is not blocked by an unhealthy already-running bundle
  ansible.builtin.assert:
    that:
      - not (switch_bundle_containers_running | default(false) | bool) or (switch_bundle_health_ok | default(false) | bool)
    fail_msg: >-
      Bundle containers are already running but the bundle health check is failing.
      Refusing gighive_bundle switch until the existing bundle runtime is healthy or stopped.
  when: switch_target_mode == 'gighive_bundle'

- name: Assert requested VM target is not already satisfied by a dual-active state
  ansible.builtin.assert:
    that:
      - not ((switch_vm_is_running | default(false) | bool) and (switch_bundle_containers_running | default(false) | bool))
    fail_msg: >-
      Both gighive2 VM and bundle runtime appear active before switching to gighive2_vm.
      Refusing to proceed until the active state is made unambiguous.
  when: switch_target_mode == 'gighive2_vm'

- name: Assert requested VM target is not already active with host ports still busy
  ansible.builtin.assert:
    that:
      - not (switch_vm_is_running | default(false) | bool) or not (switch_host_ports_busy | default(false) | bool) or (switch_bundle_containers_running | default(false) | bool)
    fail_msg: >-
      gighive2 VM already appears to be running while required host ports {{ switch_host_ports_in_use | default([]) }} are also occupied.
      Refusing to proceed because the current runtime ownership is inconsistent.
  when: switch_target_mode == 'gighive2_vm'

- name: Assert requested bundle target is not already satisfied by an unhealthy dual-active state
  ansible.builtin.assert:
    that:
      - not ((switch_vm_is_running | default(false) | bool) and (switch_bundle_containers_running | default(false) | bool) and not (switch_bundle_health_ok | default(false) | bool))
    fail_msg: >-
      Both runtimes appear active, but the bundle health check is failing.
      Refusing to switch to gighive_bundle until the current state is corrected.
  when: switch_target_mode == 'gighive_bundle'

- name: Assert bundle runtime is initialized before switching to bundle
  ansible.builtin.assert:
    that:
      - switch_bundle_initialized | default(false) | bool
      - switch_bundle_structure_ok | default(false) | bool
    fail_msg: >-
      Bundle runtime is not initialized under {{ switch_bundle_extract_dir }}.
      Complete Phase 2 bootstrap before switching to gighive_bundle.
  when: switch_target_mode == 'gighive_bundle'

- name: Stop gighive2 VM before switching to bundle
  ansible.builtin.command: >
    /usr/bin/VBoxManage controlvm "{{ switch_vm_name }}" acpipowerbutton
  become: true
  become_user: "{{ switch_vbox_user }}"
  environment:
    HOME: "{{ switch_vbox_home }}"
    VBOX_USER_HOME: "{{ switch_vbox_user_home_config }}"
  register: switch_vm_poweroff_request
  changed_when: switch_vm_is_running | default(false) | bool
  failed_when: false
  when:
    - switch_target_mode == 'gighive_bundle'
    - switch_vm_is_running | default(false) | bool

- name: Wait for gighive2 VM poweroff before switching to bundle
  ansible.builtin.command: >
    /usr/bin/VBoxManage showvminfo "{{ switch_vm_name }}" --machinereadable
  become: true
  become_user: "{{ switch_vbox_user }}"
  environment:
    HOME: "{{ switch_vbox_home }}"
    VBOX_USER_HOME: "{{ switch_vbox_user_home_config }}"
  register: switch_vm_poweroff_wait
  changed_when: false
  failed_when: false
  retries: "{{ switch_vm_poweroff_retries }}"
  delay: "{{ switch_vm_poweroff_delay_seconds }}"
  until: >-
    switch_vm_poweroff_wait.rc == 0 and
    'VMState="poweroff"' in (switch_vm_poweroff_wait.stdout | default('')) and
    'VMState="running"' not in (switch_vm_poweroff_wait.stdout | default(''))
  when:
    - switch_target_mode == 'gighive_bundle'
    - switch_vm_is_running | default(false) | bool

- name: Record switch action for VM to bundle transition when bundle is already active
  ansible.builtin.set_fact:
    switch_action_taken: "vm_to_bundle_bundle_already_running"
  when:
    - switch_target_mode == 'gighive_bundle'
    - switch_bundle_containers_running | default(false) | bool
    - switch_bundle_health_ok | default(false) | bool

- name: Record switch action for VM to bundle transition when bundle needs startup
  ansible.builtin.set_fact:
    switch_action_taken: "vm_to_bundle"
  when:
    - switch_target_mode == 'gighive_bundle'
    - not (
        (switch_bundle_containers_running | default(false) | bool) and
        (switch_bundle_health_ok | default(false) | bool)
      )

- name: Wait for bundle host ports to be free before compose up
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: "{{ item }}"
    state: stopped
    timeout: "{{ switch_host_port_wait_timeout }}"
  loop: "{{ switch_bundle_host_ports }}"
  register: switch_host_port_waits
  when:
    - switch_target_mode == 'gighive_bundle'
    - not (
        (switch_bundle_containers_running | default(false) | bool) and
        (switch_bundle_health_ok | default(false) | bool)
      )

- name: Start extracted bundle runtime with docker compose
  ansible.builtin.command: docker compose up -d --build
  args:
    chdir: "{{ switch_bundle_extract_dir }}"
  register: switch_bundle_compose_up
  changed_when: >-
    not (
      (switch_bundle_containers_running | default(false) | bool) and
      (switch_bundle_health_ok | default(false) | bool)
    )
  failed_when: switch_bundle_compose_up.rc != 0
  when:
    - switch_target_mode == 'gighive_bundle'
    - not (
        (switch_bundle_containers_running | default(false) | bool) and
        (switch_bundle_health_ok | default(false) | bool)
      )

- name: Stop extracted bundle runtime with docker compose
  ansible.builtin.command: docker compose down
  args:
    chdir: "{{ switch_bundle_extract_dir }}"
  register: switch_bundle_compose_down
  changed_when: switch_bundle_containers_running | default(false) | bool
  failed_when: switch_bundle_compose_down.rc != 0
  when:
    - switch_target_mode == 'gighive2_vm'
    - switch_bundle_compose_inspectable | default(false) | bool

- name: Check if bundle extract directory exists after compose down
  ansible.builtin.stat:
    path: "{{ switch_bundle_extract_dir }}"
  register: switch_bundle_extract_stat_after_compose_down
  when: switch_target_mode == 'gighive2_vm'

- name: Set switch_bundle_extract_exists fact after compose down
  ansible.builtin.set_fact:
    switch_bundle_extract_exists: "{{ switch_bundle_extract_stat_after_compose_down.stat.exists | default(false) }}"
  when: switch_target_mode == 'gighive2_vm'

- name: Set default bundle compose inspectability fact after compose down
  ansible.builtin.set_fact:
    switch_bundle_compose_inspectable: false
  when: switch_target_mode == 'gighive2_vm'

- name: Check docker compose ps in bundle runtime directory after compose down
  ansible.builtin.command: docker compose ps --format json
  args:
    chdir: "{{ switch_bundle_extract_dir }}"
  register: switch_bundle_compose_ps
  changed_when: false
  failed_when: false
  when:
    - switch_target_mode == 'gighive2_vm'
    - switch_bundle_extract_exists | bool

- name: Set bundle compose inspectability fact after compose down compose ps
  ansible.builtin.set_fact:
    switch_bundle_compose_inspectable: "{{ switch_bundle_compose_ps.rc | default(1) == 0 }}"
  when:
    - switch_target_mode == 'gighive2_vm'
    - switch_bundle_extract_exists | bool

- name: Set switch_bundle_containers_running fact after compose down
  ansible.builtin.set_fact:
    switch_bundle_containers_running: >-
      {{
        (switch_bundle_extract_exists | bool) and
        (switch_bundle_compose_ps is defined) and
        (switch_bundle_compose_ps.rc | default(1) == 0) and
        (
          (switch_bundle_compose_ps.stdout | default(''))
          is regex('(?is).*("State"\s*:\s*"running"|"Status"\s*:\s*"running").*')
        )
      }}
  when: switch_target_mode == 'gighive2_vm'

- name: Record switch action for bundle to VM transition
  ansible.builtin.set_fact:
    switch_action_taken: "bundle_to_vm"
  when: switch_target_mode == 'gighive2_vm'

- name: Assert bundle containers are stopped before starting VM
  ansible.builtin.assert:
    that:
      - not (switch_bundle_containers_running | default(false) | bool)
    fail_msg: >-
      Bundle containers still appear to be running after docker compose down.
      Refusing to start {{ switch_vm_name }} while bundle runtime is active.
  when: switch_target_mode == 'gighive2_vm'

- name: Wait for bundle host ports to be free before starting VM
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: "{{ item }}"
    state: stopped
    timeout: "{{ switch_host_port_wait_timeout }}"
  loop: "{{ switch_bundle_host_ports }}"
  register: switch_host_port_waits
  when: switch_target_mode == 'gighive2_vm'

- name: Start {{ switch_vm_name }} headless when it is not already running
  ansible.builtin.command: >
    /usr/bin/VBoxManage startvm "{{ switch_vm_name }}" --type headless
  become: true
  become_user: "{{ switch_vbox_user }}"
  environment:
    HOME: "{{ switch_vbox_home }}"
    VBOX_USER_HOME: "{{ switch_vbox_user_home_config }}"
  register: switch_vm_start_command
  changed_when: true
  failed_when: switch_vm_start_command.rc != 0
  when:
    - switch_target_mode == 'gighive2_vm'
    - not (switch_vm_is_running | default(false) | bool)

- name: Wait for {{ switch_vm_name }} to reach running state
  ansible.builtin.command: >
    /usr/bin/VBoxManage showvminfo "{{ switch_vm_name }}" --machinereadable
  become: true
  become_user: "{{ switch_vbox_user }}"
  environment:
    HOME: "{{ switch_vbox_home }}"
    VBOX_USER_HOME: "{{ switch_vbox_user_home_config }}"
  register: switch_vm_running_wait
  changed_when: false
  failed_when: false
  retries: "{{ switch_vm_start_retries }}"
  delay: "{{ switch_vm_start_delay_seconds }}"
  until: >-
    switch_vm_running_wait.rc == 0 and
    'VMState="running"' in (switch_vm_running_wait.stdout | default(''))
  when: switch_target_mode == 'gighive2_vm'

- name: Wait for SSH reachability on {{ switch_vm_name }} after VM start
  ansible.builtin.wait_for:
    host: "{{ switch_vm_ip }}"
    port: 22
    timeout: "{{ switch_vm_post_start_ssh_timeout_seconds }}"
    state: started
  register: switch_vm_post_start_ssh
  when: switch_target_mode == 'gighive2_vm'

- name: Wait for app health on {{ switch_vm_name }} after VM start
  ansible.builtin.command: >
    curl -sk -o /dev/null -w "%{http_code}" --max-time 5 https://{{ switch_vm_ip }}/
  register: switch_vm_post_start_app
  changed_when: false
  failed_when: false
  retries: "{{ switch_vm_post_start_app_retries }}"
  delay: "{{ switch_vm_post_start_app_delay_seconds }}"
  until: >-
    switch_vm_post_start_app.rc == 0 and
    (switch_vm_post_start_app.stdout | default('0') | int in [200, 301, 302, 401, 403])
  when: switch_target_mode == 'gighive2_vm'
