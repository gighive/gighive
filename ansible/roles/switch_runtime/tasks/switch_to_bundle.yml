---
- name: Assert bundle runtime is initialized before switching to bundle
  ansible.builtin.assert:
    that:
      - switch_bundle_initialized | default(false) | bool
      - switch_bundle_structure_ok | default(false) | bool
    fail_msg: >-
      Bundle runtime is not initialized under {{ switch_bundle_extract_dir }}.
      Complete Phase 2 bootstrap before switching to gighive_bundle.

- name: Stop gighive2 VM before switching to bundle
  ansible.builtin.include_tasks: stop_gighive2_vm.yml

- name: Wait for gighive2 VM poweroff before switching to bundle
  ansible.builtin.include_tasks: wait_for_vm_poweroff.yml

- name: Record switch action for VM to bundle transition when bundle is already active
  ansible.builtin.set_fact:
    switch_action_taken: "vm_to_bundle_bundle_already_running"
  when:
    - switch_bundle_containers_running | default(false) | bool
    - switch_bundle_health_ok | default(false) | bool

- name: Record switch action for VM to bundle transition when bundle needs startup
  ansible.builtin.set_fact:
    switch_action_taken: "vm_to_bundle"
  when: >-
    not (
      (switch_bundle_containers_running | default(false) | bool) and
      (switch_bundle_health_ok | default(false) | bool)
    )

- name: Wait for bundle host ports to be free before compose up
  ansible.builtin.include_tasks: check_host_ports.yml
  when: >-
    not (
      (switch_bundle_containers_running | default(false) | bool) and
      (switch_bundle_health_ok | default(false) | bool)
    )

- name: Start bundle runtime after VM shutdown
  ansible.builtin.include_tasks: bundle_compose_up.yml
  when: >-
    not (
      (switch_bundle_containers_running | default(false) | bool) and
      (switch_bundle_health_ok | default(false) | bool)
    )
