---
- name: Wait for {{ switch_vm_name }} to reach running state
  ansible.builtin.command: >
    /usr/bin/VBoxManage showvminfo "{{ switch_vm_name }}" --machinereadable
  become: true
  become_user: "{{ switch_vbox_user }}"
  environment:
    HOME: "{{ switch_vbox_home }}"
    VBOX_USER_HOME: "{{ switch_vbox_user_home_config }}"
  register: switch_vm_running_wait
  changed_when: false
  failed_when: false
  retries: "{{ switch_vm_start_retries }}"
  delay: "{{ switch_vm_start_delay_seconds }}"
  until: >-
    switch_vm_running_wait.rc == 0 and
    'VMState="running"' in (switch_vm_running_wait.stdout | default(''))
