---
- name: Upload tests 7 - capture DB counts before
  ansible.builtin.include_tasks: query_db_counts.yml
  vars:
    upload_tests_db_counts_prefix: upload_tests_db_before_7

- name: Upload tests 7 - stat TUS fixture
  ansible.builtin.stat:
    path: "{{ upload_test_tus_fixture }}"
  register: upload_tests_7_stat
  delegate_to: localhost
  become: false

- name: Upload tests 7 - assert fixture exists and is non-empty
  ansible.builtin.assert:
    that:
      - upload_tests_7_stat.stat.exists
      - upload_tests_7_stat.stat.size > 0
    fail_msg: "TUS fixture missing or empty: {{ upload_test_tus_fixture }}"

- name: Upload tests 7 - TUS create upload (POST /files/)
  ansible.builtin.shell: |
    set -euo pipefail
    SIZE=$(stat -c%s "{{ upload_test_tus_fixture }}")
    ENC_FNAME=$(printf '%s' "$(basename '{{ upload_test_tus_fixture }}')" | base64 -w0)
    RESPONSE=$(curl -sk -D - -o /dev/null \
      -u "{{ admin_user }}:{{ gighive_admin_password }}" \
      -X POST "{{ gighive_base_url }}/files/" \
      -H "Tus-Resumable: 1.0.0" \
      -H "Upload-Length: ${SIZE}" \
      -H "Upload-Metadata: filename ${ENC_FNAME}" \
      -H "Content-Length: 0")
    HTTP_STATUS=$(printf '%s' "$RESPONSE" | head -1 | grep -oP '\d{3}')
    LOCATION=$(printf '%s' "$RESPONSE" | grep -i '^location:' | tr -d '\r' | awk '{print $2}')
    UPLOAD_ID=$(basename "$LOCATION")
    printf '%s\n%s\n%s\n%s' "$HTTP_STATUS" "$LOCATION" "$UPLOAD_ID" "$SIZE"
  args:
    executable: /bin/bash
  register: upload_tests_7_create
  changed_when: false
  delegate_to: localhost
  become: false

- name: Upload tests 7 - parse create response
  ansible.builtin.set_fact:
    upload_tests_7_create_status: "{{ upload_tests_7_create.stdout_lines[0] }}"
    upload_tests_7_location:      "{{ upload_tests_7_create.stdout_lines[1] }}"
    upload_tests_7_upload_id:     "{{ upload_tests_7_create.stdout_lines[2] }}"
    upload_tests_7_file_size:     "{{ upload_tests_7_create.stdout_lines[3] }}"

- name: Upload tests 7 - debug create response
  ansible.builtin.debug:
    msg:
      http_status: "{{ upload_tests_7_create_status }}"
      location:    "{{ upload_tests_7_location }}"
      upload_id:   "{{ upload_tests_7_upload_id }}"

- name: Upload tests 7 - assert TUS create returned 201
  ansible.builtin.assert:
    that:
      - upload_tests_7_create_status | int == 201
      - upload_tests_7_upload_id != ''
    fail_msg: "TUS create failed: HTTP {{ upload_tests_7_create_status }}, location={{ upload_tests_7_location }}"

- name: Upload tests 7 - TUS patch upload (PATCH /files/<id>)
  ansible.builtin.command:
    argv:
      - curl
      - -sk
      - -o
      - /dev/null
      - -w
      - "%{http_code}"
      - -u
      - "{{ admin_user }}:{{ gighive_admin_password }}"
      - -X
      - PATCH
      - "{{ gighive_base_url }}/files/{{ upload_tests_7_upload_id }}"
      - -H
      - "Content-Type: application/offset+octet-stream"
      - -H
      - "Content-Length: {{ upload_tests_7_file_size }}"
      - -H
      - "Upload-Offset: 0"
      - -H
      - "Tus-Resumable: 1.0.0"
      - --data-binary
      - "@{{ upload_test_tus_fixture }}"
  register: upload_tests_7_patch
  changed_when: false
  delegate_to: localhost
  become: false

- name: Upload tests 7 - assert PATCH returned 204
  ansible.builtin.assert:
    that:
      - upload_tests_7_patch.stdout | int == 204
    fail_msg: "TUS PATCH failed: HTTP {{ upload_tests_7_patch.stdout }}"

- name: Upload tests 7 - wait for post-finish hook to write payload
  ansible.builtin.pause:
    seconds: 3

- name: Upload tests 7 - POST /api/uploads/finalize
  ansible.builtin.uri:
    url: "{{ gighive_base_url }}/api/uploads/finalize"
    method: POST
    url_username: "{{ admin_user }}"
    url_password: "{{ gighive_admin_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      upload_id:  "{{ upload_tests_7_upload_id }}"
      event_date: "{{ upload_test_event_date }}"
      org_name:   "{{ upload_test_org_name }}"
      event_type: "{{ upload_test_event_type }}"
      label:      "test_7_tus_finalize"
    status_code: [201]
    return_content: true
  register: upload_tests_7_finalize_http
  delegate_to: localhost
  become: false

- name: Upload tests 7 - parse finalize response
  ansible.builtin.set_fact:
    upload_tests_7_finalize_resp: "{{ upload_tests_7_finalize_http.json }}"

- name: Upload tests 7 - debug finalize response
  ansible.builtin.debug:
    msg:
      id:              "{{ upload_tests_7_finalize_resp.id | default('') }}"
      asset_id:        "{{ upload_tests_7_finalize_resp.asset_id | default('') }}"
      event_id:        "{{ upload_tests_7_finalize_resp.event_id | default('') }}"
      event_item_id:   "{{ upload_tests_7_finalize_resp.event_item_id | default('') }}"
      file_name:       "{{ upload_tests_7_finalize_resp.file_name | default('') }}"
      file_type:       "{{ upload_tests_7_finalize_resp.file_type | default('') }}"
      checksum_sha256: "{{ upload_tests_7_finalize_resp.checksum_sha256 | default('') }}"

- name: Upload tests 7 - assert finalize response fields
  ansible.builtin.assert:
    that:
      - upload_tests_7_finalize_resp.id is defined
      - upload_tests_7_finalize_resp.id | int > 0
      - upload_tests_7_finalize_resp.asset_id is defined
      - upload_tests_7_finalize_resp.asset_id | int > 0
      - upload_tests_7_finalize_resp.event_id is defined
      - upload_tests_7_finalize_resp.event_id | int > 0
      - upload_tests_7_finalize_resp.event_item_id is defined
      - upload_tests_7_finalize_resp.event_item_id | int > 0
      - upload_tests_7_finalize_resp.file_type in ['audio', 'video']
      - upload_tests_7_finalize_resp.checksum_sha256 is defined
    fail_msg: "Finalize response missing expected fields: {{ upload_tests_7_finalize_resp }}"

- name: Upload tests 7 - capture DB counts after
  ansible.builtin.include_tasks: query_db_counts.yml
  vars:
    upload_tests_db_counts_prefix: upload_tests_db_after_7

- name: Upload tests 7 - assert assets count increased by exactly 1
  ansible.builtin.assert:
    that:
      - (upload_tests_db_after_7_assets_count | int) == (upload_tests_db_before_7_assets_count | int) + 1
    fail_msg: >-
      assets count did not increase by 1:
      before={{ upload_tests_db_before_7_assets_count }}
      after={{ upload_tests_db_after_7_assets_count }}

- name: Upload tests 7 - assert events count did not decrease
  ansible.builtin.assert:
    that:
      - (upload_tests_db_after_7_events_count | int) >= (upload_tests_db_before_7_events_count | int)
