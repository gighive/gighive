---
- name: Upload tests - query DB row counts (events, assets)
  community.docker.docker_container_exec:
    container: "{{ mysql_container_name | default(mysql_db_host) }}"
    env:
      MYSQL_PWD: "{{ mysql_appuser_password }}"
    command: >-
      mysql -N -B --show-warnings
      -u {{ mysql_user }}
      {{ mysql_database }}
      -e "SELECT (SELECT COUNT(*) FROM events) AS events_count, (SELECT COUNT(*) FROM assets) AS assets_count;"
  register: upload_tests_db_counts

- name: Upload tests - parse DB counts
  ansible.builtin.set_fact:
    upload_tests_db_events_count: "{{ (upload_tests_db_counts.stdout.split('\t')[0] | int) if (upload_tests_db_counts.stdout | default('')) != '' else 0 }}"
    upload_tests_db_assets_count: "{{ (upload_tests_db_counts.stdout.split('\t')[1] | int) if (upload_tests_db_counts.stdout | default('')) != '' else 0 }}"

- name: Upload tests - debug DB counts vs expected
  ansible.builtin.debug:
    msg:
      db_events_count: "{{ upload_tests_db_events_count }}"
      db_assets_count: "{{ upload_tests_db_assets_count }}"
      expected_events_count: "{{ upload_tests_expect_events_count }}"
      expected_assets_count: "{{ upload_tests_expect_assets_count }}"

- name: Upload tests - assert events count (when expected provided)
  ansible.builtin.assert:
    that:
      - (upload_tests_db_events_count | int) == (upload_tests_expect_events_count | int)
    fail_msg: >-
      events count mismatch:
      db={{ upload_tests_db_events_count }}
      expected={{ upload_tests_expect_events_count }}
      assets_db={{ upload_tests_db_assets_count }}
      assets_expected={{ upload_tests_expect_assets_count }}
    success_msg: >-
      events count ok: db={{ upload_tests_db_events_count }} expected={{ upload_tests_expect_events_count }}
  when: upload_tests_expect_events_count is not none

- name: Upload tests - assert assets count (when expected provided)
  ansible.builtin.assert:
    that:
      - (upload_tests_db_assets_count | int) == (upload_tests_expect_assets_count | int)
    fail_msg: >-
      assets count mismatch:
      db={{ upload_tests_db_assets_count }}
      expected={{ upload_tests_expect_assets_count }}
      events_db={{ upload_tests_db_events_count }}
      events_expected={{ upload_tests_expect_events_count }}
    success_msg: >-
      assets count ok: db={{ upload_tests_db_assets_count }} expected={{ upload_tests_expect_assets_count }}
  when: upload_tests_expect_assets_count is not none
