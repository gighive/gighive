# One true repo root
repo_root: "{{ (playbook_dir | dirname | dirname) }}"

# Node.js — NodeSource LTS setup script (installs current LTS; no version pinned)
# Check https://github.com/nodesource/distributions for updates
nodesource_setup_url: "https://deb.nodesource.com/setup_lts.x"

gighive_home: "{{ '/root/gighive' if ansible_user == 'root' else '/home/' ~ ansible_user ~ '/gighive' }}"

gighive_marker_author_name: "Gighive"
gighive_marker_author_email: "contactgighive@gighive.app"

# Convenience paths
roles_dir: "{{ repo_root }}/ansible/roles"
cloud_init_files_dir: "{{ roles_dir }}/cloud_init/files"

